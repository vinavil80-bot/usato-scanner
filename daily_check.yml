name: Usato Scanner Check

on:
  schedule:
    - cron: '0 */6 * * *' # Gira ogni 6 ore
  workflow_dispatch: # Permette di avviarlo a mano per test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: python scanner.py
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

      - name: Commit changes # Salva i prezzi visti per non mandare doppioni
        run: |
          git config --global user.name 'Bot'
          git config --global user.email 'bot@github.com'
          git add price_history.json
          git commit -m "Update price history" || exit 0
          git push
